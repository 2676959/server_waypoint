modLoader = "javafml"
loaderVersion = "${forge_dependency}"
license = "MIT"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "2676959"
description = "Manage waypoints and sync them to other player's client automatically. Compatible with Xaero's minimap."
logoFile = "server_waypoint.png"
logoBlur = false
displayTest = "IGNORE_SERVER_VERSION"

[[dependencies.${id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_dependency}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_dependency}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "xaerominimap"
mandatory = false
versionRange = "[25.2.6,)"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "server_waypoint-common.mixins.json"
